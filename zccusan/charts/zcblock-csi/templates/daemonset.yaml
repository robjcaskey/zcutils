apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "zcblock-csi.fullname" . }}-node
  namespace: {{ include "zcblock-csi.namespace" . }}
  labels:
    {{- include "zcblock-csi.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "zcblock-csi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zcblock-csi.selectorLabels" . | nindent 8 }}
      {{- if or .Values.metrics.enabled .Values.daemonset.podAnnotations }}
      annotations:
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        {{- end }}
        {{- with .Values.metrics.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.daemonset.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "zcblock-csi.serviceAccountName" . }}
      priorityClassName: {{ .Values.daemonset.priorityClassName }}
      {{- with .Values.daemonset.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: zcblock-csi
          image: {{ include "zcblock-csi.mainImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --driver-name={{ .Values.driverName }}
            - --endpoint=unix:///csi/csi.sock
            - --node-id=$(NODE_NAME)
            - --state-dir={{ .Values.stateDir }}
            - --control-socket={{ .Values.stateDir }}/control.sock
            {{- if .Values.control.enabled }}
            - --control-url={{ .Values.control.url }}
            {{- end }}
            - --freeze-max-ttl-ms={{ .Values.freezeMaxTtlMs }}
            - --snapshot-mode={{ .Values.snapshotMode }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: state-dir
              mountPath: {{ .Values.stateDir }}
            - name: kubelet-dir
              mountPath: {{ .Values.kubeletDir }}
              mountPropagation: Bidirectional
            - name: configfs
              mountPath: {{ .Values.configfsDir }}
            - name: dev
              mountPath: {{ .Values.devDir }}
        {{- if .Values.control.enabled }}
        - name: zcblock-control
          image: {{ include "zcblock-csi.mainImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/zcblock-control
          args:
            - --listen={{ .Values.control.listen }}
            - --state-dir={{ .Values.stateDir }}
            - --freeze-max-ttl-ms={{ .Values.freezeMaxTtlMs }}
            - --snapshot-mode={{ .Values.snapshotMode }}
            {{- if .Values.logstream.path }}
            - --logstream-path={{ .Values.logstream.path }}
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: state-dir
              mountPath: {{ .Values.stateDir }}
            - name: kubelet-dir
              mountPath: {{ .Values.kubeletDir }}
              mountPropagation: Bidirectional
            - name: configfs
              mountPath: {{ .Values.configfsDir }}
            - name: dev
              mountPath: {{ .Values.devDir }}
        {{- end }}
        - name: csi-provisioner
          image: {{ include "zcblock-csi.sidecarImage" .Values.sidecars.provisioner.image | quote }}
          imagePullPolicy: {{ .Values.sidecars.provisioner.image.pullPolicy }}
          args:
            - --csi-address=/csi/csi.sock
            - --node-deployment
            - --node-deployment-immediate-binding=false
            - --strict-topology
            - --leader-election-namespace=$(POD_NAMESPACE)
            - --timeout={{ .Values.sidecars.provisioner.timeout }}
            - --v={{ .Values.sidecars.provisioner.logLevel }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
        - name: csi-snapshotter
          image: {{ include "zcblock-csi.sidecarImage" .Values.sidecars.snapshotter.image | quote }}
          imagePullPolicy: {{ .Values.sidecars.snapshotter.image.pullPolicy }}
          args:
            - --csi-address=/csi/csi.sock
            - --node-deployment
            - --leader-election-namespace=$(POD_NAMESPACE)
            - --timeout={{ .Values.sidecars.snapshotter.timeout }}
            {{- if .Values.sidecars.snapshotter.extraCreateMetadata }}
            - --extra-create-metadata
            {{- end }}
            - --v={{ .Values.sidecars.snapshotter.logLevel }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
        - name: node-driver-registrar
          image: {{ include "zcblock-csi.sidecarImage" .Values.sidecars.registrar.image | quote }}
          imagePullPolicy: {{ .Values.sidecars.registrar.image.pullPolicy }}
          args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path={{ include "zcblock-csi.pluginDir" . }}/csi.sock
            - --v={{ .Values.sidecars.registrar.logLevel }}
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
      volumes:
        - name: plugin-dir
          hostPath:
            path: {{ include "zcblock-csi.pluginDir" . }}
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: {{ .Values.registrationDir }}
            type: DirectoryOrCreate
        - name: state-dir
          hostPath:
            path: {{ .Values.stateDir }}
            type: DirectoryOrCreate
        - name: kubelet-dir
          hostPath:
            path: {{ .Values.kubeletDir }}
            type: Directory
        - name: configfs
          hostPath:
            path: {{ .Values.configfsDir }}
            type: Directory
        - name: dev
          hostPath:
            path: {{ .Values.devDir }}
            type: Directory
