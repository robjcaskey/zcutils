apiVersion: v1
kind: Namespace
metadata:
  name: zcblock-demo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zcraw-smoke
  namespace: zcblock-demo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zcraw
  volumeMode: Block
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: zcraw-smoke
  namespace: zcblock-demo
spec:
  restartPolicy: Never
  containers:
    - name: smoke
      image: debian:bookworm-slim
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          ls -l /dev/zcraw
          blockdev --getsize64 /dev/zcraw
          sleep 3600
      volumeDevices:
        - name: raw
          devicePath: /dev/zcraw
  volumes:
    - name: raw
      persistentVolumeClaim:
        claimName: zcraw-smoke
