apiVersion: v1
kind: Namespace
metadata:
  name: zcblock-csi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zcblock-csi
  namespace: zcblock-csi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zcblock-csi-provisioner
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zcblock-csi-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zcblock-csi-provisioner
subjects:
  - kind: ServiceAccount
    name: zcblock-csi
    namespace: zcblock-csi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zcblock-csi-leases
  namespace: zcblock-csi
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zcblock-csi-leases
  namespace: zcblock-csi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zcblock-csi-leases
subjects:
  - kind: ServiceAccount
    name: zcblock-csi
    namespace: zcblock-csi
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: io.zcutils.zcblock
spec:
  attachRequired: false
  fsGroupPolicy: File
  podInfoOnMount: false
  storageCapacity: false
  volumeLifecycleModes:
    - Persistent
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zcblock-csi-node
  namespace: zcblock-csi
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: zcblock-csi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zcblock-csi
    spec:
      serviceAccountName: zcblock-csi
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: zcblock-csi
          image: localhost/zcblock-csi:dev
          imagePullPolicy: IfNotPresent
          args:
            - --driver-name=io.zcutils.zcblock
            - --endpoint=unix:///csi/csi.sock
            - --node-id=$(NODE_NAME)
            - --state-dir=/var/lib/zcblock-csi
            - --control-socket=/var/lib/zcblock-csi/control.sock
            - --control-url=http://127.0.0.1:9788
            - --freeze-max-ttl-ms=5000
            - --snapshot-mode=auto
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: state-dir
              mountPath: /var/lib/zcblock-csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: configfs
              mountPath: /sys/kernel/config
            - name: dev
              mountPath: /dev
        - name: zcblock-control
          image: localhost/zcblock-csi:dev
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/zcblock-control
          args:
            - --listen=127.0.0.1:9788
            - --state-dir=/var/lib/zcblock-csi
            - --freeze-max-ttl-ms=5000
            - --snapshot-mode=auto
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: state-dir
              mountPath: /var/lib/zcblock-csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: configfs
              mountPath: /sys/kernel/config
            - name: dev
              mountPath: /dev
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v5.3.0
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=/csi/csi.sock
            - --node-deployment
            - --node-deployment-immediate-binding=false
            - --strict-topology
            - --leader-election-namespace=$(POD_NAMESPACE)
            - --timeout=60s
            - --v=3
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
        - name: csi-snapshotter
          image: registry.k8s.io/sig-storage/csi-snapshotter:v8.3.0
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=/csi/csi.sock
            - --node-deployment
            - --leader-election-namespace=$(POD_NAMESPACE)
            - --timeout=600s
            - --extra-create-metadata
            - --v=3
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.16.0
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/io.zcutils.zcblock/csi.sock
            - --v=3
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
      volumes:
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/io.zcutils.zcblock
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: state-dir
          hostPath:
            path: /var/lib/zcblock-csi
            type: DirectoryOrCreate
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: configfs
          hostPath:
            path: /sys/kernel/config
            type: Directory
        - name: dev
          hostPath:
            path: /dev
            type: Directory
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zcbrd
provisioner: io.zcutils.zcblock
reclaimPolicy: Delete
allowVolumeExpansion: false
volumeBindingMode: WaitForFirstConsumer
parameters:
  backend: zcbrd
  blocksize: "4096"
  queues: "8"
  queueDepth: "512"
  descriptorMode: advertise
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zcfile
provisioner: io.zcutils.zcblock
reclaimPolicy: Delete
allowVolumeExpansion: false
volumeBindingMode: WaitForFirstConsumer
parameters:
  backend: file-loop
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zcraw
  annotations:
    zcutils.io/raw-block-warning: "Only use with volumeMode: Block. The raw device is not formatted or wiped by the CSI driver."
provisioner: io.zcutils.zcblock
reclaimPolicy: Delete
allowVolumeExpansion: false
volumeBindingMode: WaitForFirstConsumer
parameters:
  backend: raw-block
  rawPartUUID: "6dfb2c34-e1a4-4cd5-a4f6-d82bfadcd363"
