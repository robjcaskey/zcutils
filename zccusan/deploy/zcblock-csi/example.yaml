apiVersion: v1
kind: Namespace
metadata:
  name: zcblock-demo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zcbrd-smoke
  namespace: zcblock-demo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zcbrd
  resources:
    requests:
      storage: 64Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: zcbrd-smoke
  namespace: zcblock-demo
spec:
  restartPolicy: Never
  containers:
    - name: smoke
      image: debian:bookworm-slim
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          echo zcblock-csi > /data/probe
          cat /data/probe
          sleep 3600
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: zcbrd-smoke
